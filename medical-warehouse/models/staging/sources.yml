# models/staging/sources.yml
version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: telegram_messages
        description: "Raw Telegram messages from the data lake"
        columns: [...]
  
  - name: staging
    schema: staging
    tables:
      - name: yolo_detections
        description: "YOLO object detection results"
        columns:
          - name: message_id
            description: "Message ID from Telegram"
          - name: image_path
            description: "Path to image file"
          - name: category
            description: "Image category (promotional/product_display/lifestyle/other)"
          - name: category_confidence
            description: "Confidence score for category"
          - name: class_id
            description: "YOLO class ID"
          - name: class_name
            description: "YOLO class name"
          - name: confidence
            description: "Detection confidence score"
          - name: has_person
            description: "Whether image contains a person"
          - name: has_product
            description: "Whether image contains a product"