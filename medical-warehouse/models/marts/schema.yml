# models/marts/schema.yml
version: 2

models:
  - name: dim_channels
    description: "Channel dimension table with channel attributes"
    columns:
      - name: channel_key
        description: "Surrogate key for channel"
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Name of the Telegram channel"
        tests:
          - unique
          - not_null
      - name: channel_type
        description: "Type of channel (Pharmaceutical/Cosmetics/Medical/Other)"
        tests:
          - not_null
      - name: total_posts
        description: "Total number of posts in the channel"
        tests:
          - not_null

  - name: dim_dates
    description: "Date dimension table"
    columns:
      - name: date_key
        description: "Surrogate key for date (YYYYMMDD format)"
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Full date value"
        tests:
          - unique
          - not_null
      - name: year
        description: "Year"
        tests:
          - not_null

  - name: fct_messages
    description: "Fact table for message events"
    columns:
      - name: message_key
        description: "Message ID (unique identifier)"
        tests:
          - unique
          - not_null
      - name: channel_key
        description: "Foreign key to dim_channels"
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "Foreign key to dim_dates"
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: views
        description: "Number of views"
        tests:
          - not_null